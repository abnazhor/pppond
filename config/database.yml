# Supports SQLite (default) and PostgreSQL.
# Set DATABASE_URL to switch adapters, e.g.:
#   DATABASE_URL=postgres://user:pass@localhost/myapp
#   DATABASE_URL=sqlite3:storage/development.sqlite3
#
default: &default
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

# SQLite-specific defaults (ignored when DATABASE_URL points to PostgreSQL)
sqlite_default: &sqlite_default
  <<: *default
  adapter: sqlite3
  timeout: 5000

development:
  <<: *sqlite_default
  url: <%= ENV.fetch("DATABASE_URL", "sqlite3:storage/development.sqlite3") %>

test:
  <<: *sqlite_default
  url: <%= ENV.fetch("DATABASE_URL", "sqlite3:storage/test.sqlite3") %>

production:
  primary:
    <<: *sqlite_default
    url: <%= ENV.fetch("DATABASE_URL", "sqlite3:storage/production.sqlite3") %>
  cache:
    <<: *sqlite_default
    database: storage/production_cache.sqlite3
    migrations_paths: db/cache_migrate
  queue:
    <<: *sqlite_default
    database: storage/production_queue.sqlite3
    migrations_paths: db/queue_migrate
  cable:
    <<: *sqlite_default
    database: storage/production_cable.sqlite3
    migrations_paths: db/cable_migrate
  errors:
    <<: *sqlite_default
    database: storage/production_errors.sqlite3
    migrations_paths: db/errors_migrate
